name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bridge-server/package-lock.json
      - name: Install bridge dependencies
        run: npm ci --silent --no-audit --no-fund
        working-directory: bridge-server
      - name: Shell syntax
        run: bash -n setup.sh hooks/*.sh
      - name: JavaScript syntax
        run: find . -name '*.mjs' -not -path './bridge-server/node_modules/*' -print0 | xargs -0 -n1 node --check
      # Discover from the repo root rather than an allowlist of directories:
      # the old list omitted test/, so both cross-cutting guard suites (the
      # profiles.json single-reader guard and the sync-exec timeout guard) never
      # ran in CI. This matches the command in the README.
      - name: Tests with coverage
        run: |
          find . -name '*.test.mjs' -not -path './bridge-server/node_modules/*' -print0 \
            | xargs -0 node --test --experimental-test-coverage
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=moderate
        working-directory: bridge-server
